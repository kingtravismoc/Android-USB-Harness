name: 🔒 Sole Launcher Verification

on:
  pull_request:
    branches: [ main, release ]
  push:
    branches: [ main, release ]

jobs:
  verify-signature:
    name: Verify GPG Signature & Owner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for signature verification

      - name: Install GPG
        run: sudo apt-get update && sudo apt-get install -y gnupg

      - name: Import Owner Public Key
        run: |
          echo "${{ secrets.OWNER_GPG_PUBLIC_KEY }}" | gpg --import
          # Replace with your actual Key ID fingerprint
          echo "OWNER_KEY_ID=${{ secrets.OWNER_GPG_KEY_ID }}" >> $GITHUB_ENV

      - name: Verify Last Commit Signature
        run: |
          LAST_COMMIT=$(git rev-parse HEAD)
          echo "Verifying signature for commit: $LAST_COMMIT"
          
          # Attempt to verify the signature
          if ! git verify-commit $LAST_COMMIT 2>/dev/null; then
            echo "::error::Commit $LAST_COMMIT is NOT signed or signature is invalid."
            echo "::error::ONLY the Sole Launcher (Owner) can sign commits."
            exit 1
          fi
          
          # Extract signer key
          SIGNER_KEY=$(git show -s --format=%GK $LAST_COMMIT)
          echo "Signed by Key: $SIGNER_KEY"
          
          if [ "$SIGNER_KEY" != "$OWNER_KEY_ID" ]; then
            echo "::error::Commit signed by unauthorized key: $SIGNER_KEY"
            echo "::error::Expected Key: $OWNER_KEY_ID"
            exit 1
          fi
          
          echo "✅ Signature verified. Owner confirmed."

      - name: Check Branch Protection (Secondary Check)
        run: |
          if [ "${{ github.ref }}" == "refs/heads/release" ]; then
            if [ "${{ github.actor }}" != "${{ secrets.SOLE_LAUNCHER_USERNAME }}" ]; then
              echo "::error::Direct push to release blocked for user: ${{ github.actor }}"
              exit 1
            fi
          fi

  build-and-sign:
    needs: verify-signature
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_RELEASE_KEYSTORE }}" | base64 --decode > app/keystore/release.jks

      - name: Build Signed Release
        run: ./gradlew assembleRelease
        env:
          ANDROID_STORE_FILE: ../keystore/release.jks
          ANDROID_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign Repo Index with GPG
        run: |
          echo "${{ secrets.REPO_GPG_PRIVATE_KEY }}" | gpg --import --batch
          # Sign the fdroid index.xml
          gpg --default-key ${{ secrets.REPO_GPG_KEY_ID }} --armor --detach-sign fdroid-repo/index.xml
          
      - name: Deploy to I2PD/Eepsite
        # Logic to push signed artifacts to your I2P hidden service
        run: |
          echo "Deploying signed artifacts to I2PD..."
          # Implementation depends on your I2P tunnel configuration
          # Usually involves scp over I2P or updating a git repo hosted on I2P
